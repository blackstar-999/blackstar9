version: "3.9"

networks:
  school_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-school_portal}
      POSTGRES_USER: ${DB_USERNAME:-school_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-school_user} -d ${DB_DATABASE:-school_portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - school_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── PHP-FPM (Laravel) ────────────────────────────────────────
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage/app
    networks:
      - school_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Laravel Reverb (WebSocket) ───────────────────────────────
  reverb:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --env=${APP_ENV:-production}
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage/app
    networks:
      - school_net
    depends_on:
      - app
    ports:
      - "${REVERB_PORT:-8080}:8080"

  # ─── Queue Worker (Supervisor managed) ────────────────────────
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    restart: unless-stopped
    command: /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf
    volumes:
      - ./backend:/var/www/html
      - storage_data:/var/www/html/storage/app
      - ./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    networks:
      - school_net
    depends_on:
      - app

  # ─── Nginx ────────────────────────────────────────────────────
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./backend:/var/www/html
      - ./frontend/dist:/var/www/frontend
      - storage_data:/var/www/html/storage/app
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - school_net
    depends_on:
      - app
      - reverb
